# Build the demo (guests -> rust bindings -> vite) and deploy to GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel a deploy already in flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned nightly, wasm32, rust-src)
        # rust/rust-toolchain.toml names the toolchain; `rustup toolchain
        # install` reads it (rustup ≥1.28 no longer auto-installs on use).
        run: rustup toolchain install
        working-directory: rust

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            guests

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build wasm pkg
        # build.rs compiles guests/ to wasm32 as part of this. The pkg goes to
        # web/public (served as-is, not bundled) with web-spawn's no-bundler
        # glue — see the note in web/src/party.worker.ts.
        run: wasm-pack build --release --target web --out-dir ../web/public/pkg -- --features no-bundler
        working-directory: rust

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        run: |
          npm ci
          ./node_modules/.bin/tsc --noEmit
          npm run build
        working-directory: web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
