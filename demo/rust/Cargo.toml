# The wasm-bindgen wrapper around the mpz zk-vm for the browser demo.
#
# For now this depends on a sibling checkout of mpz via path deps (spike
# phase); once the demo stabilizes these become git dependencies pinned to a
# rev.
[package]
name = "zkvm-demo"
version = "0.0.0"
edition = "2021"
publish = false

[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
mpz-core = { path = "../../mpz/crates/core" }
mpz-common = { path = "../../mpz/crates/common", features = ["test-utils"] }
mpz-ot = { path = "../../mpz/crates/ot", features = ["ideal"] }
mpz-vm-core = { path = "../../mpz/crates/vm-core" }
mpz-vm-ir = { path = "../../mpz/crates/vm-ir" }
mpz-vm-zk = { path = "../../mpz/crates/vm-zk" }

futures = "0.3"
rand = "0.9"

wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
# Pull in both getrandom generations in the mpz dep graph with their
# browser backends enabled.
getrandom_03 = { package = "getrandom", version = "0.3", features = ["wasm_js"] }
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = 3
lto = true
