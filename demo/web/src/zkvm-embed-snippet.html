<!-- ===== zkVM (SpeakUp) embed — paste anywhere, auto-scales to container width ===== -->
<div class="zkvm-embed" style="position:relative;width:100%;overflow:hidden;line-height:normal;aspect-ratio:375/252;">
<div class="zkvm-stage" style="--page:#ECE9E3; --card:#ffffff; --ink:#2E3640; --muted:#767C83; --line:#DAD6CE; --panel:#F4F2EC; --soft:#EFECE6; --cycle:12s; --cap:block; --sans:'Helvetica Neue',Arial,sans-serif; --mono:ui-monospace,'SF Mono',Menlo,monospace; width:375px; padding:0; background:var(--page); font-family:var(--sans); display:flex; justify-content:center; transform-origin:top left; transform:scale(var(--zkv-s,1))">
  <div style="width:375px">

    <div style="width:375px; background:var(--card)">
      <div style="position:relative; width:375px; height:250px; overflow:hidden">

        <!-- SpeakUp VM core: chamber -->
        <div style="position:absolute; left:128px; top:77px; width:119px; height:88px; animation:zkv-coreIn var(--cycle) ease-in-out infinite">
          <div style="position:absolute; inset:0; border:1.3px solid var(--muted); border-radius:3px; background:var(--panel); box-shadow:inset 0 0 0 4px rgba(255,255,255,.55), 0 2px 8px rgba(46,54,64,.07); overflow:hidden">
            <div style="position:absolute; left:12px; right:12px; top:16px; display:flex; flex-direction:column; gap:6px; animation:zkv-progFill var(--cycle) ease-in-out infinite">
              <div style="height:4px; width:72%; border-radius:1px; background:var(--line)"></div>
              <div style="height:4px; width:92%; border-radius:1px; background:var(--line)"></div>
              <div style="height:4px; width:54%; border-radius:1px; background:var(--line)"></div>
              <div style="height:4px; width:80%; border-radius:1px; background:var(--line)"></div>
            </div>
            <div style="position:absolute; left:9px; bottom:6px; font:600 8px var(--mono); letter-spacing:.08em; color:var(--muted)">SpeakUp VM</div>
            <div style="position:absolute; inset:0; opacity:0; animation:zkv-computeActive var(--cycle) ease-in-out infinite">
              <div style="position:absolute; top:0; bottom:0; left:-34px; width:34px; background:linear-gradient(90deg, transparent, color-mix(in srgb, var(--ink) 12%, transparent), transparent); animation:zkv-scanSweep 1.8s linear infinite"></div>
            </div>
          </div>
        </div>

        <!-- program loading into VM -->
        <div style="position:absolute; left:147px; top:30px; opacity:0; animation:zkv-loadProg var(--cycle) ease-in-out infinite">
          <div style="display:flex; align-items:center; gap:4px; padding:3px 7px; background:var(--card); border:1px solid var(--line); border-radius:2px; box-shadow:0 3px 7px rgba(46,54,64,.16)"><svg viewBox="0 0 16 16" width="11" height="11"><rect x="1" y="1" width="14" height="14" rx="2" fill="var(--ink)"/><text x="8" y="10.9" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-weight="700" font-size="6.4" letter-spacing="-0.3" fill="#fff">WA</text></svg><span style="font:600 8px var(--mono); color:var(--ink)">program.wasm</span></div>
        </div>

<script>
(function(){
  var W=375;
  function fit(box){
    var stage=box.querySelector('.zkvm-stage');
    if(!stage)return;
    var s=box.clientWidth/W;
    stage.style.setProperty('--zkv-s',s);
    box.style.height=(stage.offsetHeight*s)+'px';
  }
  function init(){
    document.querySelectorAll('.zkvm-embed').forEach(function(box){
      if(box.__zkv)return; box.__zkv=1;
      if(window.ResizeObserver){ new ResizeObserver(function(){fit(box);}).observe(box); }
      else { window.addEventListener('resize',function(){fit(box);}); }
      fit(box);
    });
  }
  if(document.readyState!=='loading')init(); else document.addEventListener('DOMContentLoaded',init);
})();
</script>
